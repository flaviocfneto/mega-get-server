<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="ft-icon-animated">
  <style>
    /*
     * FileTugger animated icon
     * ------------------------
     * The chain links pull apart and snap back, suggesting a "tug".
     *
     * States:
     *   default            — chain is still
     *   :hover             — gentle one-shot tug
     *   .ft-downloading    — continuous looped tug while downloads are active
     *
     * Apply the .ft-downloading class from JS when your download queue is busy:
     *   document.querySelector('.ft-icon-animated').classList.add('ft-downloading');
     *
     * Respects prefers-reduced-motion automatically.
     */
    .ft-chain-gold,
    .ft-chain-teal {
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 250ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Hover: one-shot tug — gold pulls down-left, teal pulls up-right */
    .ft-icon-animated:hover .ft-chain-gold {
      transform: translate(-6px, 6px);
    }
    .ft-icon-animated:hover .ft-chain-teal {
      transform: translate(6px, -6px);
    }

    /* Active download: continuous tug loop */
    .ft-icon-animated.ft-downloading .ft-chain-gold {
      animation: ft-tug-gold 1.4s ease-in-out infinite;
    }
    .ft-icon-animated.ft-downloading .ft-chain-teal {
      animation: ft-tug-teal 1.4s ease-in-out infinite;
    }

    @keyframes ft-tug-gold {
      0%, 100% { transform: translate(0, 0); }
      40%      { transform: translate(-8px, 8px); }
      60%      { transform: translate(-8px, 8px); }
    }
    @keyframes ft-tug-teal {
      0%, 100% { transform: translate(0, 0); }
      40%      { transform: translate(8px, -8px); }
      60%      { transform: translate(8px, -8px); }
    }

    /* Subtle paper wobble while tugging — the document reacts to the pull */
    .ft-paper {
      transform-box: fill-box;
      transform-origin: 256px 256px;
      transition: transform 250ms ease-out;
    }
    .ft-icon-animated:hover .ft-paper {
      transform: rotate(-1deg);
    }
    .ft-icon-animated.ft-downloading .ft-paper {
      animation: ft-paper-wobble 1.4s ease-in-out infinite;
    }
    @keyframes ft-paper-wobble {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(-1.5deg); }
    }

    /* Reduced motion: no animation, no transforms */
    @media (prefers-reduced-motion: reduce) {
      .ft-chain-gold,
      .ft-chain-teal,
      .ft-paper {
        transition: none !important;
        animation: none !important;
        transform: none !important;
      }
    }
  </style>

  <!-- Document -->
  <g class="ft-paper" transform="rotate(-13 256 256)">
    <path d="M 182 66 L 358 66 Q 406 66 406 114 L 406 398 Q 406 446 358 446 L 154 446 Q 106 446 106 398 L 106 142 Z"
          fill="#F4F5F3"/>
    <path d="M 182 66 L 106 142 L 182 142 Z" fill="#BE123C"/>
    <path d="M 182 66 L 358 66 Q 406 66 406 114 L 406 398 Q 406 446 358 446 L 154 446 Q 106 446 106 398 L 106 142 Z"
          fill="none" stroke="#0F1713" stroke-width="7" stroke-linejoin="round"/>
    <path d="M 182 66 L 182 142 L 106 142"
          fill="none" stroke="#0F1713" stroke-width="7" stroke-linejoin="round"/>
  </g>

  <!-- Chain (interlocked weave) -->
  <g transform="rotate(-43 256 256)">
    <g class="ft-chain-gold">
      <rect x="-30" y="176" width="420" height="160" rx="80"
            fill="none" stroke="#F5B82E" stroke-width="38"/>
    </g>
    <g class="ft-chain-teal">
      <rect x="122" y="176" width="420" height="160" rx="80"
            fill="none" stroke="#2DD4BF" stroke-width="38"/>
    </g>
    <g class="ft-chain-gold">
      <path d="M -30 256 A 80 80 0 0 0 50 336 L 310 336 A 80 80 0 0 0 390 256"
            fill="none" stroke="#F5B82E" stroke-width="38"/>
    </g>
  </g>
</svg>
