name: Publish Images

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish-standard:
    name: Publish standard image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Extract Docker metadata (standard)
        id: meta_standard
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ghcr.io/${{ github.repository_owner }}/linktugger
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push standard image
        id: build_standard
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta_standard.outputs.tags }}
          labels: ${{ steps.meta_standard.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9

      - name: Sign standard image (keyless)
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository_owner }}/linktugger@${{ steps.build_standard.outputs.digest }}"

      - name: Attest standard image provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/linktugger
          subject-digest: ${{ steps.build_standard.outputs.digest }}
          push-to-registry: true

  publish-hardened:
    name: Publish hardened image
    runs-on: ubuntu-latest
    if: ${{ secrets.DHI_REGISTRY_USERNAME != '' && secrets.DHI_REGISTRY_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Login to DHI registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_REGISTRY_USERNAME }}
          password: ${{ secrets.DHI_REGISTRY_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Extract Docker metadata (hardened)
        id: meta_hardened
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ghcr.io/${{ github.repository_owner }}/linktugger-hardened
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push hardened image
        id: build_hardened
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ./Dockerfile.hardened
          push: true
          tags: ${{ steps.meta_hardened.outputs.tags }}
          labels: ${{ steps.meta_hardened.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9

      - name: Sign hardened image (keyless)
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository_owner }}/linktugger-hardened@${{ steps.build_hardened.outputs.digest }}"

      - name: Attest hardened image provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/linktugger-hardened
          subject-digest: ${{ steps.build_hardened.outputs.digest }}
          push-to-registry: true
