name: Security Gate

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  release:
    types: [published]

permissions:
  contents: read
  security-events: write

jobs:
  detect-tier:
    runs-on: ubuntu-latest
    outputs:
      tier: ${{ steps.detector.outputs.tier }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Detect CI Tier
        id: detector
        run: python3 scripts/ci_tier_detector.py

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Python dependency audit
        run: |
          pip install -r api/requirements.txt pip-audit
          pip-audit -r api/requirements.txt
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - name: Node dependency audit
        run: |
          cd web
          npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-scan:
    runs-on: ubuntu-latest
    needs: [detect-tier]
    if: needs.detect-tier.outputs.tier >= 2
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r api -c pyproject.toml
      - name: Run Semgrep
        uses: semgrep/semgrep-action@646b9c9918737c3558f60f64b4c6e987c1266f80
        with:
          config: p/python p/javascript p/react

  container-scan:
    runs-on: ubuntu-latest
    needs: [detect-tier]
    if: needs.detect-tier.outputs.tier >= 2 || github.event_name == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Login to DHI registry
        if: ${{ secrets.DHI_REGISTRY_USERNAME != '' && secrets.DHI_REGISTRY_TOKEN != '' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_REGISTRY_USERNAME }}
          password: ${{ secrets.DHI_REGISTRY_TOKEN }}
      - name: Build image
        if: ${{ secrets.DHI_REGISTRY_USERNAME != '' && secrets.DHI_REGISTRY_TOKEN != '' }}
        run: docker build -t mega-get-server:security-scan .
      - name: Trivy image scan
        if: ${{ secrets.DHI_REGISTRY_USERNAME != '' && secrets.DHI_REGISTRY_TOKEN != '' }}
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: mega-get-server:security-scan
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1"

  release-integrity:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Enforce publish workflow release-integrity controls
        run: |
          FILE=".github/workflows/publish.yml"
          grep "id-token: write" "$FILE" >/dev/null || { echo "Missing id-token: write in publish permissions"; exit 1; }
          grep "attestations: write" "$FILE" >/dev/null || { echo "Missing attestations: write in publish permissions"; exit 1; }
          grep "sbom: true" "$FILE" >/dev/null || { echo "Missing sbom: true in publish build steps"; exit 1; }
          grep "provenance: true" "$FILE" >/dev/null || { echo "Missing provenance: true in publish build steps"; exit 1; }
          grep "Sign image (keyless)" "$FILE" >/dev/null || { echo "Missing keyless signing step for image"; exit 1; }
          grep "actions/attest-build-provenance@" "$FILE" >/dev/null || { echo "Missing attest-build-provenance step(s)"; exit 1; }
          echo "Release policy checks passed."

  release-artifact-runtime-verify:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Verify published image signatures and attestations
        run: |
          TAG="${{ github.event.release.tag_name }}"
          for IMAGE in "ghcr.io/${{ github.repository_owner }}/linktugger"; do
            DIGEST="$(docker buildx imagetools inspect "${IMAGE}:${TAG}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
            if [[ -z "${DIGEST}" ]]; then
              echo "Failed to resolve digest for ${IMAGE}:${TAG}"
              exit 1
            fi
            REF="${IMAGE}@${DIGEST}"
            echo "Verifying ${REF}"
            cosign verify --certificate-identity-regexp ".*" --certificate-oidc-issuer-regexp ".*" "${REF}" >/dev/null
            cosign verify-attestation --type slsaprovenance "${REF}" >/dev/null
            cosign verify-attestation --type "https://spdx.dev/Document" "${REF}" >/dev/null
          done

  security-gate:
    runs-on: ubuntu-latest
    needs: [detect-tier, dependency-audit, secret-scan, sast-scan, container-scan, release-integrity, release-artifact-runtime-verify]
    if: always()
    steps:
      - name: Enforce security gate
        run: |
          check_status() {
            if [[ "$1" != "success" && "$1" != "skipped" ]]; then
              echo "$2 failed with status $1"
              exit 1
            fi
          }
          check_status "${{ needs.dependency-audit.result }}" "dependency-audit"
          check_status "${{ needs.secret-scan.result }}" "secret-scan"
          check_status "${{ needs.sast-scan.result }}" "sast-scan"
          check_status "${{ needs.container-scan.result }}" "container-scan"
          check_status "${{ needs.release-integrity.result }}" "release-integrity"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            check_status "${{ needs.release-artifact-runtime-verify.result }}" "release-artifact-runtime-verify"
          fi
          echo "Security gate passed"
