name: Docker Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-tier:
    runs-on: ubuntu-latest
    outputs:
      tier: ${{ steps.detector.outputs.tier }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Detect CI Tier
        id: detector
        run: python3 scripts/ci_tier_detector.py

  build:
    name: Smoke build
    runs-on: ubuntu-latest
    needs: [detect-tier]
    if: needs.detect-tier.outputs.tier >= 3 || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Login to DHI registry
        if: ${{ secrets.DHI_REGISTRY_USERNAME != '' && secrets.DHI_REGISTRY_TOKEN != '' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_REGISTRY_USERNAME }}
          password: ${{ secrets.DHI_REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Run docker smoke script
        if: ${{ secrets.DHI_REGISTRY_USERNAME != '' && secrets.DHI_REGISTRY_TOKEN != '' }}
        run: ./scripts/smoke-docker-build.sh
        env:
          DHI_REGISTRY_USERNAME: ${{ secrets.DHI_REGISTRY_USERNAME }}
          DHI_REGISTRY_TOKEN: ${{ secrets.DHI_REGISTRY_TOKEN }}
