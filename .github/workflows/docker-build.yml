name: Docker Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-standard:
    name: Standard smoke build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Run docker smoke script (standard path)
        run: ./scripts/smoke-docker-build.sh

  build-hardened:
    name: Hardened smoke build
    runs-on: ubuntu-latest
    if: ${{ secrets.DHI_REGISTRY_USERNAME != '' && secrets.DHI_REGISTRY_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Login to DHI registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_REGISTRY_USERNAME }}
          password: ${{ secrets.DHI_REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Run docker smoke script (includes hardened build)
        run: ./scripts/smoke-docker-build.sh
        env:
          DHI_REGISTRY_USERNAME: ${{ secrets.DHI_REGISTRY_USERNAME }}
          DHI_REGISTRY_TOKEN: ${{ secrets.DHI_REGISTRY_TOKEN }}
