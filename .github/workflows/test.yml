name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r flet-app/requirements.txt pytest

      - name: Run tests
        run: |
          pytest flet-app/tests -v --cov=mega_service --cov=api_main --cov=tool_diagnostics --cov-report=term-missing
        env:
          PYTHONPATH: flet-app
          MEGA_SIMULATE: "1"
          UI_TEST_MODE: "1"
